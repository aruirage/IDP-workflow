<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* 処理ノード - 青 */
    .node-proc rect { fill: #eff6ff; stroke: #3b82f6; stroke-width: 1.5; rx: 8; }
    .node-proc text { font: 600 14px system-ui, sans-serif; fill: #1e40af; text-anchor: middle; }

    /* 人工確認ノード - 緑 */
    .node-hitl rect { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.5; rx: 8; }
    .node-hitl text { font: 600 13px system-ui, sans-serif; fill: #166534; text-anchor: middle; }

    /* 条件判断ノード - 黄 */
    .node-cond polygon { fill: #fef9c3; stroke: #ca8a04; stroke-width: 1.5; }
    .node-cond text { font: 600 13px system-ui, sans-serif; fill: #854d0e; text-anchor: middle; }

    /* 通知ノード - オレンジ */
    .node-notify rect { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.5; rx: 8; }
    .node-notify text { font: 600 13px system-ui, sans-serif; fill: #c2410c; text-anchor: middle; }

    /* 開始・終了マーカー */
    .node-marker rect { fill: #f3f4f6; stroke: #6b7280; stroke-width: 1; rx: 16; stroke-dasharray: 5 3; }
    .node-marker text { font: 600 13px system-ui, sans-serif; fill: #374151; text-anchor: middle; }

    /* 矢印 */
    .arrow-normal { fill: none; stroke: #9ca3af; stroke-width: 1.5; marker-end: url(#arrow-gray); }
    .arrow-return { fill: none; stroke: #7c3aed; stroke-width: 1.5; stroke-dasharray: 6 4; marker-end: url(#arrow-purple); }
    .arrow-hoken { fill: none; stroke: #ea580c; stroke-width: 1.5; stroke-dasharray: 6 4; marker-end: url(#arrow-orange); }

    /* ラベル */
    .label-branch { font: 500 12px system-ui, sans-serif; fill: #6b7280; }
    .label-return { font: 500 11px system-ui, sans-serif; fill: #7c3aed; }
    .label-hoken { font: 500 11px system-ui, sans-serif; fill: #ea580c; }
  </style>

  <defs>
    <marker id="arrow-gray" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="9" markerHeight="7" orient="auto">
      <path d="M0,0 L10,3.5 L0,7z" fill="#9ca3af"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="9" markerHeight="7" orient="auto">
      <path d="M0,0 L10,3.5 L0,7z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="9" markerHeight="7" orient="auto">
      <path d="M0,0 L10,3.5 L0,7z" fill="#ea580c"/>
    </marker>
  </defs>

  <!-- ============================================================ -->
  <!-- Layer 1: 主線ノード (Main Chain) x=600 中心                   -->
  <!-- ============================================================ -->
  <g id="layer-main-chain">

    <g class="node-marker" id="node-start" transform="translate(540, 30)">
      <rect x="0" y="0" width="120" height="36"/>
      <text x="60" y="23">開始</text>
    </g>

    <g class="node-proc" id="node-preprocess" transform="translate(520, 100)">
      <rect x="0" y="0" width="160" height="44"/>
      <text x="80" y="28">前処理</text>
    </g>

    <!-- 条件: 前処理結果 -->
    <g class="node-cond" id="node-cond-pp" transform="translate(600, 210)">
      <polygon points="0,-36 100,0 0,36 -100,0"/>
      <text x="0" y="-4">前処理結果</text>
      <text x="0" y="12" style="font-size:10px">プリセット</text>
    </g>

    <g class="node-proc" id="node-ocr" transform="translate(520, 310)">
      <rect x="0" y="0" width="160" height="44"/>
      <text x="80" y="28">OCR抽出</text>
    </g>

    <!-- 条件: OCR結果 -->
    <g class="node-cond" id="node-cond-ocr" transform="translate(600, 420)">
      <polygon points="0,-36 100,0 0,36 -100,0"/>
      <text x="0" y="-4">OCR結果</text>
      <text x="0" y="12" style="font-size:10px">プリセット</text>
    </g>

    <g class="node-proc" id="node-master" transform="translate(520, 520)">
      <rect x="0" y="0" width="160" height="44"/>
      <text x="80" y="28">マスタ照合</text>
    </g>

    <g class="node-proc" id="node-ai-verify" transform="translate(520, 610)">
      <rect x="0" y="0" width="160" height="44"/>
      <text x="80" y="28">AI検証</text>
    </g>

    <!-- 条件: AI検証結果 -->
    <g class="node-cond" id="node-cond-ai" transform="translate(600, 720)">
      <polygon points="0,-40 110,0 0,40 -110,0"/>
      <text x="0" y="-6">AI検証結果</text>
      <text x="0" y="10" style="font-size:10px">プリセット</text>
    </g>

    <g class="node-notify" id="node-notify-done" transform="translate(520, 840)">
      <rect x="0" y="0" width="160" height="44"/>
      <text x="80" y="28">通知（処理完了）</text>
    </g>

    <g class="node-marker" id="node-end" transform="translate(540, 930)">
      <rect x="0" y="0" width="120" height="36"/>
      <text x="60" y="23">終了</text>
    </g>

  </g>

  <!-- ============================================================ -->
  <!-- Layer 2: 左側分岐ノード (Left Branch: 人工確認)               -->
  <!-- ============================================================ -->
  <g id="layer-left-branch-nodes">

    <!-- 前処理 → 人工確認 -->
    <g class="node-hitl" id="node-hitl-pp" transform="translate(200, 188)">
      <rect x="0" y="0" width="140" height="44"/>
      <text x="70" y="28">人工確認</text>
    </g>

    <!-- OCR → 人工確認 -->
    <g class="node-hitl" id="node-hitl-ocr" transform="translate(200, 398)">
      <rect x="0" y="0" width="140" height="44"/>
      <text x="70" y="28">人工確認</text>
    </g>

    <!-- AI検証 → 人工確認 -->
    <g class="node-hitl" id="node-hitl-ai" transform="translate(200, 698)">
      <rect x="0" y="0" width="140" height="44"/>
      <text x="70" y="28">人工確認</text>
    </g>

  </g>

  <!-- ============================================================ -->
  <!-- Layer 3: 右側分岐ノード (Right Branch: 補件通知)              -->
  <!-- ============================================================ -->
  <g id="layer-right-branch-nodes">

    <g class="node-notify" id="node-notify-hoken" transform="translate(830, 698)">
      <rect x="0" y="0" width="160" height="44"/>
      <text x="80" y="28">通知（補件依頼）</text>
    </g>

  </g>

  <!-- ============================================================ -->
  <!-- Layer 4: 主線矢印 (Main Chain Arrows)                        -->
  <!-- ============================================================ -->
  <g id="layer-main-arrows">
    <!-- 開始 → 前処理 -->
    <line x1="600" y1="66" x2="600" y2="100" class="arrow-normal"/>

    <!-- 前処理 → 条件PP -->
    <line x1="600" y1="144" x2="600" y2="174" class="arrow-normal"/>

    <!-- 条件PP 通過 → OCR -->
    <line x1="600" y1="246" x2="600" y2="310" class="arrow-normal"/>
    <text x="606" y="284" class="label-branch">通過</text>

    <!-- OCR → 条件OCR -->
    <line x1="600" y1="354" x2="600" y2="384" class="arrow-normal"/>

    <!-- 条件OCR 通過 → マスタ照合 -->
    <line x1="600" y1="456" x2="600" y2="520" class="arrow-normal"/>
    <text x="606" y="494" class="label-branch">通過</text>

    <!-- マスタ照合 → AI検証 -->
    <line x1="600" y1="564" x2="600" y2="610" class="arrow-normal"/>

    <!-- AI検証 → 条件AI -->
    <line x1="600" y1="654" x2="600" y2="680" class="arrow-normal"/>

    <!-- 条件AI 全通過 → 通知（処理完了） -->
    <line x1="600" y1="760" x2="600" y2="840" class="arrow-normal"/>
    <text x="606" y="806" class="label-branch">全通過</text>

    <!-- 通知（処理完了） → 終了 -->
    <line x1="600" y1="884" x2="600" y2="930" class="arrow-normal"/>
  </g>

  <!-- ============================================================ -->
  <!-- Layer 5: 左側分岐矢印 (Left Branch Arrows)                   -->
  <!-- ============================================================ -->
  <g id="layer-left-branch-arrows">

    <!-- 条件PP 要確認 → 人工確認PP -->
    <line x1="500" y1="210" x2="340" y2="210" class="arrow-normal"/>
    <text x="410" y="200" class="label-branch">要確認</text>

    <!-- 人工確認PP 承認 → OCR（主線合流） -->
    <path d="M270,232 L270,332 L520,332" class="arrow-normal"/>
    <text x="276" y="288" class="label-branch">承認</text>

    <!-- 条件OCR 要確認 → 人工確認OCR -->
    <line x1="500" y1="420" x2="340" y2="420" class="arrow-normal"/>
    <text x="410" y="410" class="label-branch">要確認</text>

    <!-- 人工確認OCR 承認 → マスタ照合（主線合流） -->
    <path d="M270,442 L270,542 L520,542" class="arrow-normal"/>
    <text x="276" y="498" class="label-branch">承認</text>

    <!-- 条件AI 要修正 → 人工確認AI -->
    <line x1="490" y1="720" x2="340" y2="720" class="arrow-normal"/>
    <text x="406" y="710" class="label-branch">要修正</text>

    <!-- 人工確認AI 承認 → 通知（処理完了）合流 -->
    <path d="M270,742 L270,862 L520,862" class="arrow-normal"/>
    <text x="276" y="808" class="label-branch">承認</text>

  </g>

  <!-- ============================================================ -->
  <!-- Layer 6: 右側分岐矢印 (Right Branch Arrows)                  -->
  <!-- ============================================================ -->
  <g id="layer-right-branch-arrows">

    <!-- 条件AI 書類不足 → 通知（補件依頼） -->
    <line x1="710" y1="720" x2="830" y2="720" class="arrow-normal"/>
    <text x="752" y="710" class="label-branch">書類不足</text>

  </g>

  <!-- ============================================================ -->
  <!-- Layer 7: 戻りループ (Return / 修正 Loops)                    -->
  <!-- ============================================================ -->
  <g id="layer-return-loops">

    <!-- 人工確認PP 修正 → 前処理 -->
    <path d="M200,210 L140,210 L140,122 L520,122" class="arrow-return"/>
    <text x="148" y="170" class="label-return">修正</text>

    <!-- 人工確認OCR 修正 → OCR -->
    <path d="M200,420 L140,420 L140,332 L520,332" class="arrow-return"/>
    <text x="148" y="380" class="label-return">修正</text>

    <!-- 人工確認AI 修正 → AI検証 -->
    <path d="M200,720 L100,720 L100,632 L520,632" class="arrow-return"/>
    <text x="108" y="680" class="label-return">修正</text>

  </g>

  <!-- ============================================================ -->
  <!-- Layer 8: 補件ループ (Hoken Return Loop)                      -->
  <!-- ============================================================ -->
  <g id="layer-hoken-loop">

    <path d="M990,720 L1060,720 L1060,122 L680,122" class="arrow-hoken"/>
    <text x="1068" y="430" class="label-hoken" transform="rotate(-90,1068,430)">補件到着 → 前処理から再実行</text>

  </g>

  <!-- ============================================================ -->
  <!-- Layer 9: 凡例 (Legend)                                       -->
  <!-- ============================================================ -->
  <g id="layer-legend" transform="translate(60, 1000)">
    <line x1="0" y1="0" x2="1050" y2="0" stroke="#e5e7eb" stroke-width="1"/>

    <rect x="0" y="20" width="18" height="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" rx="3"/>
    <text x="24" y="32" style="font:500 12px system-ui,sans-serif;fill:#374151">処理ノード</text>

    <rect x="130" y="20" width="18" height="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="1" rx="3"/>
    <text x="154" y="32" style="font:500 12px system-ui,sans-serif;fill:#374151">人工確認</text>

    <polygon points="270,27 282,20 294,27 282,34" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
    <text x="300" y="32" style="font:500 12px system-ui,sans-serif;fill:#374151">条件判断</text>

    <rect x="400" y="20" width="18" height="14" fill="#fff7ed" stroke="#ea580c" stroke-width="1" rx="3"/>
    <text x="424" y="32" style="font:500 12px system-ui,sans-serif;fill:#374151">通知</text>

    <line x1="490" y1="27" x2="530" y2="27" class="arrow-hoken" style="stroke-width:1.2"/>
    <text x="536" y="32" style="font:500 12px system-ui,sans-serif;fill:#374151">補件ループ</text>

    <line x1="650" y1="27" x2="690" y2="27" class="arrow-return" style="stroke-width:1.2"/>
    <text x="696" y="32" style="font:500 12px system-ui,sans-serif;fill:#374151">修正（戻り）</text>

    <text x="0" y="66" style="font:600 12px system-ui,sans-serif;fill:#374151">デフォルト構成</text>
    <text x="0" y="86" style="font:400 11px system-ui,sans-serif;fill:#6b7280">処理ノード ×4：前処理 → OCR抽出 → マスタ照合 → AI検証</text>
    <text x="0" y="104" style="font:400 11px system-ui,sans-serif;fill:#6b7280">条件判断 ×3：前処理結果 / OCR結果 / AI検証結果（各プリセット）</text>
    <text x="0" y="122" style="font:400 11px system-ui,sans-serif;fill:#6b7280">人工確認 ×3：前処理・OCR・AI検証の各条件分岐先（左側）</text>
    <text x="0" y="140" style="font:400 11px system-ui,sans-serif;fill:#6b7280">通知 ×2：補件依頼（書類不足時・右側）/ 処理完了（正常完結時・主線）</text>
  </g>

</svg>
